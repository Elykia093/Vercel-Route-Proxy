<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vercel-Route-Proxy</title>
    <meta name="description" content="基于 Vercel routes 的轻量路由代理工具">
    <meta name="theme-color" content="#F5F5F7">
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231D1D1F' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71'%3E%3C/path%3E%3Cpath d='M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71'%3E%3C/path%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
                    },
                    colors: {
                        apple: {
                            gray: '#F5F5F7',
                            text: '#1D1D1F',
                            subtext: '#86868B',
                            blue: '#0071E3',
                            blueHover: '#0077ED',
                        }
                    },
                    transitionTimingFunction: {
                        'apple': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #F5F5F7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Remove default input styling */
        input[type="url"]::-webkit-search-decoration,
        input[type="url"]::-webkit-search-cancel-button,
        input[type="url"]::-webkit-search-results-button,
        input[type="url"]::-webkit-search-results-decoration {
            display: none;
        }

        /* Smooth auto-fill for webkit */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px transparent inset !important;
            -webkit-text-fill-color: #1D1D1F !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-apple-text selection:bg-apple-blue/20 selection:text-apple-text">

    <!-- Soft Environment Blur Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <!-- Ultra-soft, highly transparent blobs for that premium Apple feel -->
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#0071E3]/[0.04] rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#5E5CE6]/[0.04] rounded-full blur-[100px]"></div>
        <div class="absolute top-[20%] left-[40%] w-[40%] h-[40%] bg-slate-300/[0.08] rounded-full blur-[120px]"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-3xl mx-auto z-10 relative">
        
        <!-- Typography Header -->
        <div class="text-center mb-12 mt-[-5vh]">
            <h1 class="text-[40px] sm:text-[48px] font-bold tracking-[-0.03em] text-apple-text mb-4 leading-tight">Vercel-Route-Proxy</h1>
            <p class="text-[17px] sm:text-[19px] text-apple-subtext max-w-lg mx-auto leading-[1.47059] tracking-[-0.022em]">
                基于 Vercel routes 的轻量代理。通过协议、主机与路径的简单映射，实现直接的 URL 转发。
            </p>
        </div>

        <!-- Interactive Core -->
        <div class="w-full max-w-2xl">
            <!-- Glass Input Container -->
            <div class="group relative bg-white/70 backdrop-blur-3xl rounded-[24px] p-2 sm:p-2.5 flex flex-col sm:flex-row items-center gap-2 transition-all duration-500 ease-apple ring-1 ring-black/[0.03] shadow-[inset_0_1px_1px_rgba(255,255,255,0.8),0_2px_12px_rgba(0,0,0,0.02),0_8px_32px_rgba(0,0,0,0.02)] focus-within:bg-white/90 focus-within:ring-black/[0.05] focus-within:shadow-[inset_0_1px_1px_rgba(255,255,255,1),0_4px_16px_rgba(0,0,0,0.04),0_12px_48px_rgba(0,0,0,0.04)]">
                
                <div class="flex-1 w-full relative flex items-center px-4">
                    <svg class="w-[18px] h-[18px] text-apple-subtext/50 mr-3 flex-shrink-0 transition-colors duration-300 group-focus-within:text-apple-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                    
                    <input type="url" id="targetInput" class="w-full h-[50px] sm:h-[48px] bg-transparent border-none outline-none text-apple-text placeholder-apple-subtext/60 text-[16px] sm:text-[17px] font-medium transition-all" placeholder="输入目标 URL，例如 https://api.example.com" autocomplete="off" spellcheck="false" autofocus>
                    
                    <button id="clearBtn" class="absolute right-2 p-1.5 text-apple-subtext hover:text-apple-text opacity-0 scale-90 pointer-events-none transition-all duration-300 ease-apple bg-black/5 hover:bg-black/10 rounded-full" title="清空" aria-label="清空输入框">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>

                <button id="proxyBtn" disabled class="w-full sm:w-auto h-[50px] sm:h-[48px] px-8 bg-apple-blue text-white rounded-[18px] text-[15px] font-semibold tracking-wide transition-all duration-400 ease-apple disabled:opacity-40 disabled:bg-apple-subtext/20 disabled:text-apple-text/40 disabled:cursor-not-allowed hover:bg-apple-blueHover hover:shadow-md hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2 flex-shrink-0">
                    <span id="btnText">立即代理</span>
                    <svg id="btnSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>
            
            <!-- Format Example -->
            <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3 sm:gap-4 text-[13px] text-apple-subtext select-none">
                <div class="bg-white/50 backdrop-blur-md border border-black/[0.04] px-3.5 py-1.5 rounded-[10px] font-mono shadow-[0_1px_2px_rgba(0,0,0,0.01)] text-apple-text/80 tracking-tight">https://api.example.com</div>
                <svg class="w-4 h-4 text-apple-subtext/30 hidden sm:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                <svg class="w-4 h-4 text-apple-subtext/30 block sm:hidden rotate-90 my-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                <div class="bg-apple-blue/5 backdrop-blur-md border border-apple-blue/10 px-3.5 py-1.5 rounded-[10px] font-mono shadow-[0_1px_2px_rgba(0,0,0,0.01)] text-apple-blue tracking-tight">/https/api.example.com</div>
            </div>
        </div>

    </main>

    <!-- Footer Links -->
    <footer class="w-full pb-8 flex justify-center gap-8 text-[13px] text-apple-subtext font-medium z-10 relative">
        <a href="https://github.com/elykia093/Vercel-Route-Proxy" target="_blank" rel="noopener" class="hover:text-apple-text transition-colors duration-300 ease-apple">GitHub</a>
        <a href="https://vercel.com" target="_blank" rel="noopener" class="hover:text-apple-text transition-colors duration-300 ease-apple">Vercel</a>
    </footer>

    <!-- Glass Toast Notification -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 flex items-center gap-2.5 bg-white/85 backdrop-blur-2xl border border-black/[0.04] px-4 py-3 rounded-full shadow-[0_8px_32px_rgba(0,0,0,0.06),0_2px_8px_rgba(0,0,0,0.04),inset_0_1px_1px_rgba(255,255,255,1)] opacity-0 pointer-events-none z-50 transition-all duration-500 ease-apple transform -translate-y-4 scale-95">
        <div id="toastIcon" class="flex-shrink-0"></div>
        <span id="toastMsg" class="text-[14px] font-medium text-apple-text pr-1"></span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('targetInput');
            const btn = document.getElementById('proxyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');

            let toastTimeout;

            const parseUrl = (val) => {
                const trimmed = val.trim();
                if (!trimmed) return null;
                const urlStr = /^[a-z]+:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
                try {
                    const u = new URL(urlStr);
                    return u.host ? u : null;
                } catch {
                    return null;
                }
            };

            const validate = () => {
                const hasValue = input.value.length > 0;
                const isValid = parseUrl(input.value) !== null;
                
                btn.disabled = !isValid;
                
                if (hasValue) {
                    clearBtn.classList.remove('opacity-0', 'scale-90', 'pointer-events-none');
                    clearBtn.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
                } else {
                    clearBtn.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
                    clearBtn.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
                }
            };

            const showToast = (message, type = 'success') => {
                clearTimeout(toastTimeout);
                toastMsg.textContent = message;
                
                if (type === 'error') {
                    toastIcon.innerHTML = `<svg class="w-[18px] h-[18px] text-[#FF3B30]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
                } else {
                    toastIcon.innerHTML = `<svg class="w-[18px] h-[18px] text-apple-blue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }

                toast.classList.remove('opacity-0', '-translate-y-4', 'scale-95');
                toast.classList.add('opacity-100', 'translate-y-0', 'scale-100');

                toastTimeout = setTimeout(() => {
                    toast.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
                    toast.classList.add('opacity-0', '-translate-y-4', 'scale-95');
                }, 3000);
            };

            const handleProxy = async () => {
                const target = parseUrl(input.value);
                if (!target) {
                    showToast('无效的 URL 格式', 'error');
                    return;
                }

                btn.disabled = true;
                btnText.textContent = '处理中...';
                btnSpinner.classList.remove('hidden');

                // Artificial micro-delay for smooth UX feeling
                await new Promise(r => setTimeout(r, 200));

                try {
                    const proxyUrl = `${location.origin}/${target.protocol.slice(0, -1)}/${target.host}${target.pathname}${target.search}${target.hash}`;
                    window.open(proxyUrl, '_blank', 'noopener,noreferrer');
                    showToast('已生成代理链接');
                } catch (err) {
                    showToast('执行失败', 'error');
                } finally {
                    btn.disabled = false;
                    btnText.textContent = '立即代理';
                    btnSpinner.classList.add('hidden');
                }
            };

            clearBtn.addEventListener('click', () => {
                input.value = '';
                validate();
                input.focus();
            });

            input.addEventListener('input', validate);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !btn.disabled) {
                    e.preventDefault();
                    input.blur();
                    handleProxy();
                }
            });
            btn.addEventListener('click', handleProxy);

            // Initial check to set correct UI states
            validate();
        });
    </script>
</body>
</html>
